<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../assets/style.css">
    <title>Document</title>
</head>

<body>

    <div class="global-container">

        <!-- 0 SIDE : liste verticale statique des pages disponibles-->
        <div class="side-container">
            <nav>
                <div class="nav-section">
                    <a href="home.html">Home</a>
                    <a href="">About</a>
                    <a href="">Blog</a>
                </div>
                <div class="middle-cut"></div>
                <div class="nav-section">
                    <a href="">Art</a>
                    <a href="">Design</a>
                    <a href="">3D</a>
                    <a href="">Music</a>
                </div>
            </nav>
        </div>

        <!-- 1 MAIN : contenu principal scrollable de la page -->
        <div class="main-container">
            <div class="banner">
                <img src="../../assets/img/digital/260413.png" alt="">
            </div>
            <div class="main-content">

                <!-- 1.1 header -->
                <header>
                    <h1>Art</h1>
                    <div class="tag-container">
                        <a href="digital.html" class="tag">Digital</a>
                        <a href="paper.html" class="tag">Paper</a>
                        <a href="gartic-phone.html" class="tag active">GarticPhone</a>
                    </div>
                </header>

                <!-- 1.2 main -->
                <main>

                    <div class="lightbox" id="lightbox">
                        <div class="lightbox-content">
                            <img class="lightbox-img" id="lightbox-img" src="" alt="">
                            <div class="lightbox-infos">
                                <div class="lighbox-main"><b id="lightbox-titre"></b><br>
                                    <p id="lightbox-description"></p>
                                </div>
                                <div class="lighbox-alt"><i id="lightbox-date"></i><br>
                                    <p id="lightbox-tag"></p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <h2>2026</h2>
                    <div class="grid-container">
                        <a href="../../assets/img/digital/260413.png" style="background-image: url(../../assets/img/digital/260413.png);"
                            data-date="13.04.2026" data-tag="MsPaint" data-titre="frr"
                            data-description="Someone's hidden brother">
                        </a>
                    </div>
                </main>

                <!-- 1.3 footer -->
                <footer>
                    <img src="../../assets/img/digital/260413.png" alt="">
                    <div class="footer-content">
                        <div class="footer-section">
                            <h4>Social</h4>
                            <div class="footer-links">
                                <a href="#">Twitter</a>
                                <a href="#">Cara</a>
                                <a href="#">Discord</a>
                            </div>
                        </div>
                        <div class="footer-section">
                            <h4>Contact</h4>
                            <div class="footer-links">
                                <a href="#">sontacred@gmail.com</a>
                                <a href="#">Github</a>
                            </div>
                        </div>
                        <div class="footer-section">
                            <h4>More</h4>
                            <div class="footer-links">
                                <a href="../../doc/describe.html">describe.html</a>
                                <a href="https://neocities.org/site/sontacred">Neocities</a>
                            </div>
                        </div>
                    </div>
                </footer>

            </div>
        </div>

    </div>

    <!-- SCRIPT -->
    <script>
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');

        document.querySelectorAll('.grid-container a').forEach(link => {
            link.addEventListener('click', e => {
                e.preventDefault();
                lightboxImg.src = link.href;
                document.getElementById('lightbox-titre').textContent = link.dataset.titre || '';
                document.getElementById('lightbox-description').textContent = link.dataset.description || '';
                document.getElementById('lightbox-date').textContent = link.dataset.date || '';
                document.getElementById('lightbox-tag').textContent = link.dataset.tag || '';
                lightbox.classList.add('active');
            });
        });

        lightbox.addEventListener('click', e => {
            if (e.target !== lightboxImg) lightbox.classList.remove('active');
        });

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') lightbox.classList.remove('active');
        });
    </script>

</body>

</html>
